<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الكورسات</title>
  <style>
    body {
      margin: 0;
      font-family: "Cairo", sans-serif;
      background: url("images/5416.jpeg") no-repeat center center fixed;
      background-size: cover;
      color: #fff;
      line-height: 1.8;
    }

    /* ===== رأس الصفحة ===== */
    .page-header {
      text-align: center;
      padding: 30px;
      background: rgba(0,0,0,0.6);
    }
    .page-header h1 { font-size: 32px; margin-bottom: 10px; }
    .page-header p { color: #ddd; }

    /* ===== حاوية الكورسات ===== */
    .courses-container {
      max-width: 1100px;
      margin: 30px auto;
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 30px;
    }
    .course-box {
      border: 3px solid #fff;
      border-radius: 15px;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.5);
      box-shadow: 0 6px 14px rgba(0,0,0,0.4);
      transition: 0.3s;
    }
    .course-box:hover { transform: scale(1.03); }
    .course-image img { width: 100%; height: auto; }
    .course-content { padding: 20px; }
    .course-content h2 { margin-bottom: 12px; font-size: 26px; }
    .course-content p { font-size: 18px; margin-bottom: 15px; }

    /* ===== أزرار ===== */
    .pay-btn {
      display: inline-block;
      padding: 10px 20px;
      border: 2px solid #fff;
      color: #fff;
      background: transparent;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }
    .pay-btn:hover {
      background: #fff;
      color: #000;
      transform: scale(1.05);
    }

    /* ===== تجاوب ===== */
    @media (min-width: 768px) { .courses-container { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 1024px) { .courses-container { grid-template-columns: repeat(3, 1fr); } }
  </style>
</head>
<body class="course-page">

  <header class="page-header">
    <h1>📚 كورسات البرمجة</h1>
    <p>اختر كورسك وابدأ رحلتك</p>
 
  <!--🔓 زر فتح صفحةالكورسات -->

    color: #fff;
    font-size: 18px;
    font-weight: bold;
    border-radius: 12px;
    text-decoration: none;
    transition: 0.3s;
  }
  .learn-btn:hover {
    background: linear-gradient(45deg, #4f46e5, #7c3aed);
    transform: scale(1.05);
  }
</style>
  </header>
