<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>سياسة الخصوصية - FaragDev98</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="index, follow" />
  <meta name="description" content="سياسة الخصوصية لموقع FaragDev98 توضح كيفية جمع البيانات وحمايتها واستخدامها." />
  <link rel="icon" href="icons/ai-icon.png" type="image/png" />
  <style>
    body {
      font-family: 'Cairo', sans-serif;
      margin: 0;
      background: #f9f9f9;
      line-height: 2;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      background: linear-gradient(90deg, #4a148c, #7e57c2);
      color: white;
      padding: 20px;
    }
    header img {
      height: 40px;
      margin-right: 10px;
    }
    header h1 {
      margin: 0;
      font-size: 24px;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 15px;
      padding: 20px;
      flex-wrap: nowrap; /* الأزرار كلها على سطر واحد */
      background-color: transparent;
    }
    .buttons button {
      border: none;
      padding: 12px 20px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s;
      color: white;
    }
    .buttons button:nth-child(1) { background-color: #6a1b9a; }
    .buttons button:nth-child(2) { background-color: #00897b; }
    .buttons button:nth-child(3) { background-color: #c62828; }
    .buttons button:nth-child(4) { background-color: #2e7d32; }

    .buttons button:hover {
      opacity: 0.9;
    }

    .privacy {
      max-width: 950px;
      margin: 0 auto;
      padding: 30px;
      background: white;
      border-radius: 10px;
      color: #333;
      font-size: 17px;
    }
    .privacy h2 {
      margin-top: 0;
      color: #4a148c;
    }
  </style>
</head>
<body>

  <header>
    <h1>FaragDev98</h1>
    <img src="icons/ai-icon.png" alt="AI Icon" />
  </header>

  <div class="buttons">
    <button onclick="location.href='index.html'">الرئيسية</button>
    <button onclick="location.href='article.html'">المقالات</button>
    <button onclick="location.href='contact.html'">اتصل بنا</button>
    <button onclick="location.href='services.html'">الخدمات</button>
  </div>

  <div class="privacy">
    <h2>سياسة الخصوصية</h2>
    <p>نرحب بك في موقع FaragDev98. نحن نحرص على حماية خصوصيتك...</p>
    <!-- باقي النص كما هو بدون تعديل -->
  </div>

  <!-- الفوتر سيتم إدراجه من ملف خارجي -->
  <div id="footer"></div>
  <script src="footer.js"></script>

</body>
</html>
