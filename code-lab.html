<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>مختبر الأكواد  FaragDev98</title>
  <link rel="icon" type="image/png" href="icons/ai-icon.png">

  <style>
    body {
      font-family: 'Cairo', sans-serif;
      background: #121212;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: red;
      margin-bottom: 30px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    h1 img {
      width: 32px;
      height: 32px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    select,
    button {
      background: transparent;
      border: 2px solid white;
      color: white;
      padding: 10px 15px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    select:hover,
    button:hover {
      background: red;
    }

    #runBtn {
      background: #007bff;
      border-color: #007bff;
    }

    #runBtn:hover {
      background: #0056b3;
      border-color: #0056b3;
    }

    .back-button {
      background: #28a745;
      border: none;
      color: white;
      padding: 10px 15px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .back-button:hover {
      background: #1e7e34;
    }

    .editors {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: space-between;
    }

    .editor-section {
      flex: 1;
      min-width: 300px;
      display: flex;
      flex-direction: column;
    }

    textarea {
      height: 200px;
      background: #1e1e1e;
      color: white;
      border: 1px solid #555;
      border-radius: 10px;
      padding: 10px;
      font-family: monospace;
      font-size: 14px;
      resize: vertical;
    }

    h2 {
      margin-top: 40px;
      text-align: center;
    }

    iframe {
      width: 100%;
      height: 300px;
      border: 1px solid #444;
      border-radius: 10px;
      background: white;
      margin-top: 10px;
    }

    footer {
      text-align: center;
      color: #aaa;
      margin-top: 40px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <h1>
    <img src="icons/ai-icon.png" alt/>
     مختبر الأكواد - FaragDev98
  </h1>

  <div class="toolbar">
    <select id="languageSelect">
      <option value="html">HTML</option>
      <option value="css">CSS</option>
      <option value="javascript">JavaScript</option>
      <option value="python">Python</option>
      <option value="php">PHP</option>
      <option value="java">Java</option>
      <option value="c">C</option>
      <option value="cpp">C++</option>
      <option value="ruby">Ruby</option>
      <option value="go">Go</option>
    </select>
    <button id="runBtn" onclick="runCode()">تشغيل الكود</button>
    <button class="back-button" onclick="goBack()">🔙 رجوع للخدمات</button>
  </div>

  <div class="editors">
    <div class="editor-section">
      <label for="htmlCode">كود HTML</label>
      <textarea id="htmlCode" placeholder="أدخل كود HTML هنا..."></textarea>
    </div>

    <div class="editor-section">
      <label for="cssCode">كود CSS</label>
      <textarea id="cssCode" placeholder="أدخل كود CSS هنا..."></textarea>
    </div>

    <div class="editor-section">
      <label for="jsCode">كود JavaScript</label>
      <textarea id="jsCode" placeholder="أدخل كود JavaScript هنا..."></textarea>
    </div>
  </div>

  <h2>النتيجة:</h2>
  <iframe id="result"></iframe>

  <footer>
    <p>جميع الحقوق محفوظة &copy; FaragDev98 - 2025</p>
  </footer>

  <script>
    function runCode() {
      const html = document.getElementById("htmlCode").value;
      const css = document.getElementById("cssCode").value;
      const js = document.getElementById("jsCode").value;

      const resultFrame = document.getElementById("result");
      resultFrame.srcdoc = `
        <html>
          <head>
            <style>${css}</style>
          </head>
          <body>
            ${html}
            <script>${js}<\/script>
          </body>
        </html>
      `;
    }

    function goBack() {
      window.location.href = "services.html";
    }
  </script>

  <script src="footer.js"></script>

</body>
</html>
