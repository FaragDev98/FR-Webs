<style>

.navbar-content {
  display: flex;
  justify-content: space-around;
  align-items: center;
  flex-wrap: wrap;
  flex-direction: row-reverse;
  padding: 20px;
  border-radius: 20px;
  background: linear-gradient(45deg, #000000, #8B0000, #6a0dad);
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  animation: colorShift 6s infinite alternate;
}

.light-container {
  text-align: center;
  animation: dropIn 1s ease-out forwards;
}

.light-link {
  text-decoration: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  font-size: 26px;
}

.light {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 28px;
  border: 2px solid #fff;
  color: #fff;
  transition: transform 0.3s, box-shadow 0.3s;
  text-shadow: 0 0 12px #fff;
  background: none;
}

.icon, .fas {
  width: 40px;
  height: 40px;
  color: white;
  font-size: 24px;
}

/* الأزرار تحت الأيقونات */
.button {
  display: inline-block;
  padding: 4px 10px;
  font-size: 12px;
  font-weight: bold;
  border-radius: 12px;
  color: white;
  cursor: pointer;
  animation: glow 1.5s infinite alternate;
}

/* ألوان مخصصة */
.contact-btn { background-color: #ff3bff; }
.blog-btn { background-color: #ffeb3b; color: #000; }
.services-btn { background-color: #3bff7a; }
.home-btn { background-color: #ff3b3b; }
.learn-btn { background-color: #3b82ff; }

/* أنيميشن الأزرار */
@keyframes glow {
  0% { opacity: 0.6; box-shadow: 0 0 5px currentColor; }
  50% { opacity: 1; box-shadow: 0 0 15px currentColor; }
  100% { opacity: 0.6; box-shadow: 0 0 5px currentColor; }
}

@keyframes dropIn {
  0% { transform: translateY(-100px); opacity: 0; }
  100% { transform: translateY(0); opacity: 1; }
}

@keyframes colorShift {
  0% { background: linear-gradient(45deg, #000000, #6a0dad); }
  33% { background: linear-gradient(45deg, #8B0000, #6a0dad); }
  66% { background: linear-gradient(45deg, #000000, #8B0000); }
  100% { background: linear-gradient(45deg, #6a0dad, #000000); }
}

.light:hover {
  transform: scale(1.2) rotateY(10deg);
  box-shadow: 0 0 25px currentColor;
}

/* ✅ التجاوب الكامل */
@media (max-width: 1024px) {
  .navbar-content {
    flex-wrap: wrap;
    justify-content: center;
    gap: 25px;
  }
  .light { width: 55px; height: 55px; }
  .icon, .fas { font-size: 26px; }
  .button { font-size: 14px; padding: 5px 12px; }
}

@media (max-width: 768px) {
  .navbar-content {
    flex-wrap: wrap;
    justify-content: center;
    gap: 18px;
  }
  .light { width: 50px; height: 50px; }
  .icon, .fas { font-size: 22px; }
  .button { font-size: 13px; padding: 5px 10px; }
}

@media (max-width: 480px) {
  .navbar-content {
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  .light { width: 45px; height: 45px; }
  .icon, .fas { font-size: 20px; }
  .button { font-size: 12px; padding: 4px 8px; }
}
</style>
