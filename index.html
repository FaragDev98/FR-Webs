<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FR Webs — تسجيل الدخول</title>
  <link rel="stylesheet" href="css/sty.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <h2>تسجيل الدخول</h2>

    <!-- حقول تسجيل الدخول -->
    <form id="loginForm">
      <input type="text" id="username" placeholder="اسم المستخدم أو البريد الإلكتروني" required>
      <input type="password" id="password" placeholder="كلمة المرور" required>
      <button type="submit">دخول</button>
    </form>

    <p class="or">أو</p>

    <!-- تسجيل عبر جوجل وفيسبوك -->
    <div class="social-login">
      <button class="google-login"><i class="fab fa-google"></i> تسجيل الدخول عبر جوجل</button>
      <button class="facebook-login"><i class="fab fa-facebook-f"></i> تسجيل الدخول عبر فيسبوك</button>
    </div>

    <p class="signup">ليس لديك حساب؟ <span id="createAccount">إنشاء حساب جديد</span></p>
  </div>
</div>

<script src="js/foo.js"></script>
</body>
</html>
