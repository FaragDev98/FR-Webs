<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>صفحة الحماية - FarajDev98</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(to right, #ece9f3, #d1c4e9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 30px 20px;
      max-width: 500px;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }

    img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 15px;
      border: 4px solid #7e57c2;
    }

    h1 {
      font-size: 26px;
      color: #5e35b1;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      color: #444;
      line-height: 1.7;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="https://avatars.githubusercontent.com/u/170858605?v=4" alt="Faraj Abdallah">
    <h1>مرحبًا بك في صفحة الحماية</h1>
    <p>
      أنا <strong>Faraj Abdallah</strong>، مطوّر مواقع وتطبيقات ومؤسس منصة <strong>Fabrica Course</strong>.  
      هذه الصفحة مخصصة لحماية حقوق المحتوى من النسخ أو السرقة أو التلاعب،  
      ويتم تفعيل بعض الأكواد الأمنية تلقائيًا لحماية الموقع بالكامل.
    </p>
  </div>

  <script src="protection.js"></script>
</body>
</html>
