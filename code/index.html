<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
   <title> FR Webs مختبر اكواد </title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- CSS العام (الهيدر + الفوتر من الجذر) -->
  <link rel="stylesheet" href="../style.css">

  <!-- CSS خاص بصفحة الخدمات -->
  <link rel="stylesheet" href="style.css">
 <style>
    /* تنسيقات إضافية سريعة لتحسين المظهر داخل الصفحة */
    .audio-btn { background: #007bff; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-bottom: 10px; }
    .audio-btn:hover { background: #0056b3; }
    .download-link { display: inline-block; margin-top: 10px; color: #28a745; font-weight: bold; text-decoration: none; }
    .lesson-content { display: none; margin-top: 15px; padding: 15px; background: #f9f9f9; border-left: 5px solid #007bff; color: #333; text-align: justify; }
    .show-text-btn { background: #eee; border: 1px solid #ccc; padding: 5px 10px; cursor: pointer; font-size: 0.9em; }
    .post { margin-bottom: 40px; }
 </style>
</head>
<body


<!-- قسم الأكواد -->
<section class="editors">
  <div class="editor">
    <h3>HTML</h3>
    <textarea id="htmlCode"></textarea>
  </div>

  <div class="editor">
    <h3>CSS</h3>
    <textarea id="cssCode"></textarea>
  </div>

  <div class="editor">
    <h3>JavaScript</h3>
    <textarea id="jsCode"></textarea>
  </div>
</section>

<div class="controls">
  <button id="runBtn">تشغيل الكود</button>
  <select id="languageSelect">
    <option value="">تحديد لغة</option>
    <option value="html">HTML</option>
    <option value="css">CSS</option>
    <option value="js">JS</option>
  </select>
</div>
<div class="editor result-box">
  <h2 class="result-title">النتيجة</h2>
  <iframe id="resultFrame"></iframe>
</div>
<script src="../footer.js"></script>
<script src="script.js"></script>

</body>
</html>
