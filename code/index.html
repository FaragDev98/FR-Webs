<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مختبر الأكواد - FR.WEBS</title>
  <link rel="stylesheet" href="style.css">
   <link rel="stylesheet" href="/style.css">
</head>
<body>
<div data-include="ui-system/header.html"></div>
  <header>
    <h1>مختبر الأكواد - FR.WEBS</h1>
    <select id="languageSelect">
      <option value="html">HTML</option>
      <option value="css">CSS</option>
      <option value="js">JavaScript</option>
    </select>
    <button id="runBtn">تشغيل الكود</button>
  </header>

  <section class="editors">
    <div class="editor">
      <h3>HTML</h3>
      <textarea id="htmlCode"></textarea>
    </div>

    <div class="editor">
      <h3>CSS</h3>
      <textarea id="cssCode"></textarea>
    </div>

    <div class="editor">
      <h3>JavaScript</h3>
      <textarea id="jsCode"></textarea>
    </div>
  </section>

  <h2 class="result-title">النتيجة</h2>
  <iframe id="resultFrame"></iframe>

<script src="/footer.js"></script>
<script src="ui-system/header.js"></script>
  <script src="script.js"></script>
</body>
</html>
