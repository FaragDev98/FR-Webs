<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تواصل معنا - FaragDev98</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #e0f7fa, #f3e5f5);
    }

    header {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      background-color: #6a1b9a;
      color: white;
      padding: 15px 30px;
    }

    .logo {
      display: flex;
      align-items: center;
      font-size: 24px;
      font-weight: bold;
      gap: 12px;
      margin-left: auto;
    }

    .logo img {
      width: 32px;
      height: 32px;
    }

    .nav-bar {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      padding: 15px;
      background-color: #fff;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .nav-bar a {
      text-decoration: none;
      font-weight: bold;
      color: white;
      padding: 10px 20px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .nav-bar a:nth-child(1) { background-color: #2196f3; }
    .nav-bar a:nth-child(2) { background-color: #fbc02d; color: black; }
    .nav-bar a:nth-child(3) { background-color: #4caf50; }
    .nav-bar a:nth-child(4) { background-color: #ab47bc; }

    .nav-bar a:hover {
      opacity: 0.85;
    }

    .contact-content {
      max-width: 800px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.08);
      font-size: 18px;
    }

    .contact-content h2 {
      text-align: center;
      color: #6a1b9a;
      margin-bottom: 25px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .form-group input,
    textarea {
      padding: 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
    }

    textarea {
      resize: vertical;
      height: 120px;
    }

    .explanation {
      margin-top: 15px;
      color: #555;
      font-size: 15px;
      background-color: #f3e5f5;
      padding: 10px;
      border-radius: 8px;
    }

    .send-button {
      display: block;
      margin: 20px auto 0;
      background-color: #6a1b9a;
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .send-button:hover {
      background-color: #4a148c;
    }

    .buttons-group {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      margin-top: 30px;
    }

    .buttons-group a {
      text-decoration: none;
      padding: 12px 20px;
      border-radius: 8px;
      color: white;
      font-weight: bold;
      transition: 0.3s;
    }

    .buttons-group a:nth-child(1) { background-color: #25d366; } /* WhatsApp */
    .buttons-group a:nth-child(2) { background-color: #d44638; } /* Email */
    .buttons-group a:nth-child(3) { background-color: #1877f2; } /* Facebook */
    .buttons-group a:nth-child(4) { background-color: #0077b5; } /* LinkedIn */
    .buttons-group a:nth-child(5) { background-color: #ff0000; } /* YouTube */

    .buttons-group a:hover {
      opacity: 0.85;
    }

    footer {
      text-align: center;
      background: #e1bee7;
      padding: 20px;
      font-size: 14px;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <!-- رأس الموقع -->
  <header>
    <div class="logo">
      <img src="icons/ai-icon.png" alt="Icon">
      <span>FaragDev98</span>
    </div>
  </header>

  <!-- شريط التنقل -->
  <div class="nav-bar">
    <a href="index.html">الرئيسية</a>
    <a href="services.html">الخدمات</a>
    <a href="article.html">مقال</a>
    <a href="contact.html">تواصل</a>
  </div>

  <!-- محتوى التواصل -->
  <div class="contact-content">
    <h2>📞 تواصل معنا</h2>

    <form onsubmit="sendMail(); return false;" class="form-group">
      <input type="text" id="name" placeholder="🧑‍💻 الاسم">
      <textarea id="message" placeholder="📝 اكتب رسالتك هنا..."></textarea>
      <div class="explanation">📧 سيتم إرسال الرسالة إلى بريدنا الإلكتروني عند الضغط على زر الإرسال.</div>
      <button type="submit" class="send-button">إرسال</button>
    </form>

    <!-- روابط التواصل -->
    <div class="buttons-group">
      <a href="https://wa.me/201066047545" target="_blank">واتساب</a>
      <a href="mailto:Farajbdallh891@gmail.com">البريد الإلكتروني</a>
      <a href="https://www.facebook.com/share/1BBUfn2qdA/" target="_blank">فيسبوك</a>
      <a href="https://www.linkedin.com/in/factory-course-43a655358" target="_blank">لينكدإن</a>
      <a href="https://www.youtube.com/@Fabrica-courses" target="_blank">يوتيوب</a>
    </div>
  </div>

  <!-- التذييل -->
  <footer>
    <script src="footer.js"></script>
  </footer>

  <!-- سكربت الإرسال -->
  <script>
    function sendMail() {
      const name = document.getElementById("name").value.trim();
      const message = document.getElementById("message").value.trim();
      if (!message) {
        alert("يرجى كتابة رسالة قبل الإرسال.");
        return;
      }
      const subject = name ? `رسالة من ${name}` : "رسالة من زائر";
      const mailtoLink = `mailto:Farajbdallh891@gmail.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(message)}`;
      window.location.href = mailtoLink;
    }
  </script>

</body>
</html>
