  <title>تواصل معنا - FaragDev98</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #e0f7fa, #f3e5f5);
      color: #333;
    }

    /* رأس الموقع العلوي */
    .top-header {
      background: #6a1b9a;
      color: white;
      padding: 15px 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    .top-header::before {
      content: "📘 ";
    }

    /* شريط الروابط */
    nav {
      display: flex;
      justify-content: center;
      background: #f5f5f5;
      flex-wrap: wrap;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    nav a {
      padding: 12px 20px;
      text-decoration: none;
      color: white;
      font-weight: bold;
      transition: 0.3s;
      border-radius: 0 0 10px 10px;
      margin: 2px;
    }

    nav a:nth-child(1) {
      background-color: #2196f3; /* أزرق */
    }

    nav a:nth-child(2) {
      background-color: #fdd835; /* أصفر */
      color: #333;
    }

    nav a:nth-child(3) {
      background-color: #66bb6a; /* أخضر */
    }

    nav a:nth-child(4) {
      background-color: #ab47bc; /* بنفسجي */
    }

    nav a:hover {
      opacity: 0.8;
    }

    /* محتوى التواصل */
    .contact-section {
      max-width: 750px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
    }

    .contact-section h2 {
      text-align: center;
      color: #6a1b9a;
      margin-bottom: 30px;
    }

    .contact-methods {
      display: grid;
      grid-template-columns: 1fr;
      gap: 15px;
      font-size: 18px;
    }

    .contact-methods a {
      display: block;
      color: #333;
      background-color: #ede7f6;
      padding: 15px;
      border-radius: 10px;
      text-decoration: none;
      transition: 0.3s;
    }

    .contact-methods a:hover {
      background-color: #ce93d8;
      color: white;
    }

    .contact-methods i {
      margin-left: 10px;
    }

    footer {
      text-align: center;
      padding: 20px 10px;
      background: #e1bee7;
      color: #333;
      font-size: 14px;
    }

    .footer-links {
      margin-top: 10px;
    }

    .footer-links a {
      color: #283593;
      text-decoration: none;
      margin: 0 10px;
      font-weight: 500;
    }

    .footer-links a:hover {
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      nav {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
