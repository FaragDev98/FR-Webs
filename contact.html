<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تواصل معنا - FaragDev98</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #e0f7fa, #f3e5f5);
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #6a1b9a;
      color: white;
      padding: 10px 20px;
    }

    .logo {
      display: flex;
      align-items: center;
      font-size: 20px;
      font-weight: bold;
      gap: 10px;
    }

    .logo img {
      width: 28px;
      height: 28px;
    }

    .nav-buttons {
      display: flex;
      gap: 8px;
    }

    .nav-buttons a {
      text-decoration: none;
      color: white;
      padding: 6px 12px;
      border-radius: 6px;
      font-weight: bold;
      font-size: 14px;
    }

    .nav-home { background-color: #4caf50; }
    .nav-service { background-color: #2196f3; }
    .nav-article { background-color: #ff9800; }
    .nav-contact { background-color: #e91e63; }

    .contact-content {
      max-width: 500px;
      margin: 30px auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }

    .contact-content h2 {
      text-align: center;
      color: #6a1b9a;
      margin-bottom: 20px;
    }

    .buttons-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }

    .buttons-container a {
      display: block;
      text-align: center;
      padding: 10px;
      border-radius: 8px;
      font-weight: bold;
      text-decoration: none;
      color: white;
      font-size: 14px;
    }

    .whatsapp  { background-color: #4caf50; }
    .website   { background-color: #673ab7; }
    .youtube   { background-color: #d32f2f; }
    .facebook  { background-color: #3b5998; }
    .instagram { background-color: #e1306c; }

    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    textarea {
      width: 100%;
      height: 120px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 15px;
      resize: vertical;
    }

    .send-button {
      align-self: center;
      background-color: #6a1b9a;
      color: white;
      border: none;
      padding: 10px 25px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
    }

    .send-button:hover {
      background-color: #4a148c;
    }

    footer {
      text-align: center;
      background-color: #e1bee7;
      padding: 15px;
      font-size: 13px;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <!-- الهيدر -->
  <header>
    <div class="logo">
      <img src="icons/ai-icon.png" alt="icon" />
      <span>FaragDev98</span>
    </div>
    <div class="nav-buttons">
      <a class="nav-home" href="#">الرئيسية</a>
      <a class="nav-service" href="#">خدمة</a>
      <a class="nav-article" href="#">مقال</a>
      <a class="nav-contact" href="#">تواصل</a>
    </div>
  </header>

  <!-- المحتوى -->
  <div class="contact-content">
    <h2>📞 تواصل معنا</h2>

    <!-- أزرار الروابط -->
    <div class="buttons-container">
      <a class="whatsapp" href="https://wa.me/201066047545" target="_blank">💬 واتساب</a>
      <a class="website" href="https://fabrica-courses.netlify.app/" target="_blank">🌐 موقعي</a>
      <a class="youtube" href="https://youtube.com/@FaragDev98" target="_blank">🎥 يوتيوب</a>
      <a class="facebook" href="https://www.facebook.com/share/1BBUfn2qdA/" target="_blank">📘 فيسبوك</a>
      <a class="instagram" href="https://www.instagram.com" target="_blank">📸 إنستغرام</a>
    </div>

    <!-- نموذج الرسالة -->
    <form action="mailto:Farajbdallh891@gmail.com" method="POST" enctype="text/plain">
      <textarea name="message" placeholder="📝 اكتب رسالتك هنا..."></textarea>
      <button class="send-button" type="submit">📤 إرسال الرسالة</button>
    </form>
  </div>

  <!-- الفوتر -->
  <footer>
    FaragDev98 © 2025 جميع الحقوق محفوظة |
    <a href="privacy.html">سياسة الخصوصية</a> |
    <a href="terms.html">الشروط والأحكام</a>
  </footer>

</body>
</html>
