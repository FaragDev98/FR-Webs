<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تواصل معنا - FaragDev98</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #e0f7fa, #f3e5f5);
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #6a1b9a;
      color: white;
      padding: 15px 30px;
      gap: 12px;
    }

    .logo {
      display: flex;
      align-items: center;
      font-size: 24px;
      font-weight: bold;
      gap: 12px;
      direction: ltr; /* علشان الأيقونة تبقى على الشمال */
    }

    .logo img {
      width: 32px;
      height: 32px;
      order: -1; /* الأيقونة تروح أول عنصر */
    }

    .nav-bar {
      display: flex;
      justify-content: center;
      gap: 15px;
      background-color: #f8bbd0;
      padding: 12px;
    }

    .nav-bar a {
      text-decoration: none;
      font-weight: bold;
      padding: 10px 20px;
      border-radius: 8px;
      color: white;
      transition: 0.3s;
    }

    .nav-bar a:nth-child(1) { background-color: #4caf50; }
    .nav-bar a:nth-child(2) { background-color: #2196f3; }
    .nav-bar a:nth-child(3) { background-color: #ff5722; }
    .nav-bar a:nth-child(4) { background-color: #9c27b0; }

    .nav-bar a:hover {
      opacity: 0.9;
    }

    .contact-content {
      max-width: 800px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 25px rgba(0, 0, 0, 0.1);
      font-size: 18px;
    }

    .contact-content h2 {
      text-align: center;
      color: #6a1b9a;
      margin-bottom: 10px;
    }

    .contact-content p {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
      font-size: 17px;
    }

    .buttons-container {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 15px;
      margin-bottom: 30px;
    }

    .buttons-container a {
      flex: 1 1 22%;
      text-align: center;
      text-decoration: none;
      font-weight: bold;
      padding: 12px;
      border-radius: 10px;
      color: white;
      transition: 0.3s;
    }

    .whatsapp    { background-color: #4caf50; }
    .website     { background-color: #673ab7; }
    .youtube     { background-color: #d32f2f; }
    .facebook    { background-color: #3b5998; }
    .instagram   { background-color: #e1306c; }

    .buttons-container a:hover {
      opacity: 0.9;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    textarea {
      width: 100%;
      height: 140px;
      padding: 15px;
      border: 1px solid #ccc;
      border-radius: 10px;
      resize: vertical;
      font-size: 16px;
    }

    .send-button {
      background-color: #6a1b9a;
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      width: fit-content;
      align-self: center;
    }

    .send-button:hover {
      background-color: #4a148c;
    }

    footer {
      text-align: center;
      background: #f3e5f5;
      padding: 20px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <!-- رأس الصفحة -->
  <header>
    <div class="logo">
      <img src="icons/ai-icon.png" alt="Icon">
      <span>FaragDev98</span>
    </div>
  </header>

  <!-- شريط التنقل -->
  <nav class="nav-bar">
    <a href="index.html">🏠 الرئيسية</a>
    <a href="services.html">🛠️ خدمة</a>
    <a href="article.html">📄 مقال</a> <!-- تم التعديل هنا -->
    <a href="contact.html">📞 تواصل</a>
  </nav>

  <!-- محتوى الصفحة -->
  <div class="contact-content">
    <h2>📞 تواصل معنا</h2>
    <p>يمكنك التواصل معنا مباشرة عبر وسائل التواصل التالية أو إرسال رسالة من النموذج أدناه.</p>

    <!-- الأزرار -->
    <div class="buttons-container">
      <a class="whatsapp" href="https://wa.me/201066047545" target="_blank">💬 واتساب</a>
      <a class="website" href="https://fabrica-courses.netlify.app/" target="_blank">🌐 موقعي</a>
      <a class="youtube" href="https://youtube.com/@FaragDev98" target="_blank">🎥 يوتيوب</a>
      <a class="facebook" href="https://www.facebook.com/share/1BBUfn2qdA/" target="_blank">📘 فيسبوك</a>
      <a class="instagram" href="https://www.instagram.com" target="_blank">📸 إنستغرام</a>
    </div>

    <!-- نموذج الرسالة -->
    <form action="mailto:Farajbdallh891@gmail.com" method="POST" enctype="text/plain">
      <textarea name="message" placeholder="📝 اكتب رسالتك هنا..."></textarea>
      <button class="send-button" type="submit">📤 إرسال الرسالة</button>
    </form>
  </div>

  <!-- التذييل -->
  <footer>
    <script src="footer.js"></script>
  </footer>

</body>
</html>
