  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #e0f7fa, #f3e5f5);
    }

    /* رأس الموقع */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #6a1b9a;
      color: white;
      padding: 15px 30px;
      flex-wrap: wrap;
    }

    .logo {
      display: flex;
      align-items: center;
      font-size: 24px;
      font-weight: bold;
      gap: 12px;
    }

    .logo img {
      width: 32px;
      height: 32px;
    }

    .logo-text {
      order: 1;
    }

    .logo-icon {
      order: 2;
      margin-left: auto;
    }

    /* شريط التنقل */
    .nav-bar {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 15px;
      background-color: #fff;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      flex-wrap: wrap;
    }

    .nav-bar a {
      text-decoration: none;
      font-weight: bold;
      color: white;
      padding: 12px 24px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .nav-bar a:nth-child(1) {
      background-color: #2196f3;
    }

    .nav-bar a:nth-child(2) {
      background-color: #fbc02d;
      color: black;
    }

    .nav-bar a:nth-child(3) {
      background-color: #4caf50;
    }

    .nav-bar a:nth-child(4) {
      background-color: #ab47bc;
    }

    .nav-bar a:hover {
      opacity: 0.85;
    }

    /* محتوى الصفحة */
    .contact-content {
      max-width: 800px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.08);
      font-size: 18px;
    }

    .contact-content h2 {
      text-align: center;
      color: #6a1b9a;
      margin-bottom: 25px;
    }

    .contact-content a {
      display: block;
      margin: 10px 0;
      text-decoration: none;
      background-color: #f3e5f5;
      padding: 15px;
      border-radius: 8px;
      color: #333;
      transition: 0.3s;
    }

    .contact-content a:hover {
      background-color: #ce93d8;
      color: white;
    }

    footer {
      text-align: center;
      background: #e1bee7;
      padding: 20px;
      font-size: 14px;
      margin-top: 40px;
    }

    .footer-links a {
      margin: 0 10px;
      text-decoration: none;
      color: #333;
      font-weight: 500;
    }

    .footer-links a:hover {
      text-decoration: underline;
    }

    /* ترتيب مخصص للأيقونة */
    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .header-content .right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-content .left {
      margin-right: auto;
    }
  </style>
