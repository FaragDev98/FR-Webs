    .nav-bar {
      display: flex;

      gap: 20px;
      flex-wrap: wrap;
      padding: 12px;
      background-color: #fff;

    .nav-bar a {
      text-decoration: none;
      font-weight: bold;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      transition: 0.3s;

    .nav-bar a:nth-child(1) {
      background-color: #2196f3;
    }

      max-width: 800px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.08);

    }

    .contact-content h2 {
      text-align: center;
      color: #6a1b9a;
      margin-bottom: 25px;
    }

    .contact-content a {
      display: block;
      margin: 10px 0;
      text-decoration: none;
      background-color: #f3e5f5;
      padding: 15px;
      border-radius: 8px;
      color: #333;
      transition: 0.3s;
    }

    .contact-content a:hover {
      background-color: #ce93d8;
      color: white;

    .footer-links a {

      text-decoration: none;
      color: #333;
      font-weight: 500;
    }
