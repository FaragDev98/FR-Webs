<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تواصل معنا - FaragDev98</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #e0f7fa, #f3e5f5);
    }

    header {
      text-align: left;
      padding: 15px 30px;
      background-color: #6a1b9a;
      color: white;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 24px;
      font-weight: bold;
    }

    .logo img {
      width: 32px;
      height: 32px;
    }

    .nav-bar {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 10px;
      background-color: #fff;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .nav-bar a {
      text-decoration: none;
      font-weight: bold;
      color: white;
      padding: 10px 20px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .nav-bar a:nth-child(1) { background-color: #2196f3; }
    .nav-bar a:nth-child(2) { background-color: #fbc02d; color: black; }
    .nav-bar a:nth-child(3) { background-color: #4caf50; }
    .nav-bar a:nth-child(4) { background-color: #ab47bc; }

    .nav-bar a:hover {
      opacity: 0.85;
    }

    .contact-content {
      max-width: 800px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.08);
      font-size: 18px;
    }

    .contact-content h2 {
      text-align: center;
      color: #6a1b9a;
      margin-bottom: 25px;
    }

    .contact-buttons a {
      display: block;
      margin: 10px 0;
      text-decoration: none;
      background-color: #f3e5f5;
      padding: 12px;
      border-radius: 8px;
      color: #333;
      transition: 0.3s;
      text-align: center;
    }

    .contact-buttons a:hover {
      background-color: #ce93d8;
      color: white;
    }

    textarea {
      width: 100%;
      height: 150px;
      padding: 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
      resize: vertical;
      font-size: 16px;
      margin-top: 20px;
    }

    .send-button {
      display: block;
      margin: 20px auto 0;
      background-color: #6a1b9a;
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .send-button:hover {
      background-color: #4a148c;
    }

    footer {
      text-align: center;
      background: #e1bee7;
      padding: 20px;
      font-size: 14px;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <!-- رأس الموقع -->
  <header>
    <div class="logo">
      <img src="icons/ai-icon.png" alt="Icon" />
      <span>FaragDev98</span>
    </div>
  </header>

  <!-- شريط التنقل -->
  <div class="nav-bar">
    <a href="index.html">الرئيسية</a>
    <a href="services.html">الخدمات</a>
    <a href="article.html">مقال</a>
    <a href="contact.html">تواصل</a>
  </div>

  <!-- محتوى التواصل -->
  <div class="contact-content">
    <h2>📞 تواصل معنا</h2>

    <div class="contact-buttons">
      <a href="https://wa.me/201066047545" target="_blank">💬 واتساب: 01066047545</a>
      <a href="tel:01091838789">📱 الهاتف: 01091838789</a>
      <a href="mailto:Farajbdallh891@gmail.com">✉️ البريد الإلكتروني: Farajbdallh891@gmail.com</a>
      <a href="https://www.facebook.com/share/1BBUfn2qdA/" target="_blank">📘 صفحتنا على فيسبوك</a>
    </div>

    <!-- حقل الرسالة -->
    <form onsubmit="sendMail(event)">
      <textarea id="message" placeholder="📝 اكتب رسالتك هنا..."></textarea>
      <button type="submit" class="send-button">إرسال</button>
    </form>
  </div>

  <!-- التذييل -->
  <footer>
    <script src="footer.js"></script>
  </footer>

  <!-- سكربت إرسال البريد -->
  <script>
    function sendMail(e) {
      e.preventDefault();
      const message = document.getElementById("message").value.trim();
      if (message === "") {
        alert("يرجى كتابة رسالة قبل الإرسال.");
        return;
      }

      const mailtoLink = `mailto:Farajbdallh891@gmail.com?subject=رسالة من الزائر&body=${encodeURIComponent(message)}`;
      window.location.href = mailtoLink;
    }
  </script>

</body>
</html>
