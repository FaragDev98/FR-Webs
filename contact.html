    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #e0f7fa, #e1bee7);
      color: #333;
    }

    header {
      background: linear-gradient(to left, #6a1b9a, #283593);
      color: white;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo {
      font-weight: bold;
      font-size: 26px;
      display: flex;
      align-items: center;
    }

    .logo::before {
      content: "📘";
      margin-left: 10px;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
      font-size: 16px;
      transition: 0.3s;
    }

    nav a:hover {
      color: #ffd54f;
    }

    .contact-section {
      max-width: 800px;
      margin: 40px auto;
      background: #ffffffea;
      padding: 40px 25px;
      border-radius: 16px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.15);
    }

    .contact-section h2 {
      text-align: center;
      color: #6a1b9a;
      margin-bottom: 30px;
      font-size: 28px;
    }

    .contact-methods {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      font-size: 18px;
    }

    .contact-methods a {
      display: block;
      color: #333;
      background: linear-gradient(to right, #f3e5f5, #e1bee7);
      padding: 15px 20px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .contact-methods a:hover {
      background: linear-gradient(to right, #ab47bc, #7e57c2);
      color: white;
      transform: scale(1.02);
    }

    .contact-methods i {
      margin-left: 10px;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #eee;
      margin-top: 40px;
      font-size: 14px;
      color: #555;
    }
  </style>
