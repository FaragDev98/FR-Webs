    header {
      display: flex;
      justify-content: space-between;
      align-items: center;

      justify-content: center;
      gap: 15px;
      padding: 15px;
      background-color: #fff;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .nav-bar a {
      text-decoration: none;
      font-weight: bold;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      transition: 0.3s;
    }

    .nav-bar a:nth-child(1) { background-color: #2196f3; }
    .nav-bar a:nth-child(2) { background-color: #fbc02d; color: black; }
    .nav-bar a:nth-child(3) { background-color: #4caf50; }
    .nav-bar a:nth-child(4) { background-color: #ab47bc; }

    .nav-bar a:hover {
      opacity: 0.85;
    }

    .contact-content {
      max-width: 800px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 25px rgba(0, 0, 0, 0.1);
      font-size: 18px;
    }

    .contact-content h2 {
      text-align: center;
      color: #6a1b9a;
      margin-bottom: 25px;
    }

    .contact-links {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 30px;
    }

    .contact-links a {
      text-decoration: none;
      background-color: #f3e5f5;
      padding: 12px;
      border-radius: 8px;
      color: #333;
      transition: 0.3s;
    }

    .contact-links a:hover {
      background-color: #ce93d8;
      color: white;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    textarea {
      width: 100%;
      height: 140px;
      padding: 15px;
      border: 1px solid #ccc;
      border-radius: 10px;
      resize: vertical;
      font-size: 16px;
    }

    .send-button {
      background-color: #6a1b9a;
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      width: fit-content;
      align-self: center;
    }

    .send-button:hover {
      background-color: #4a148c;
    }

    footer {
      text-align: center;
      background: #e1bee7;
      padding: 20px;
      font-size: 14px;
