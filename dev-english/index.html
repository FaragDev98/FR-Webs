<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تعلم الانجليزية مع FR.WEBS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- CSS أساسي داخل الملف -->
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Tahoma, sans-serif;
      background: #f3f4f8;
      color: #222;
      line-height: 1.6;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    .card-title {
      font-size: 22px;
      color: #6a5acd;
      margin-bottom: 8px;
    }

    .card-desc {
      font-size: 14px;
      color: #555;
      margin-bottom: 15px;
    }

    .phrases {
      display: block;
    }

    .phrase-row {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 10px;
      align-items: center;
      background: #f7f7ff;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
      border: 1px solid #e0e0ff;
    }

    .eng {
      font-weight: bold;
      color: #222;
    }

    .ara {
      color: #444;
    }

    .btns {
      display: flex;
      gap: 6px;
    }

    .speak-btn {
      background: #6a5acd;
      color: #fff;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: 0.3s;
    }

    .speak-btn:hover {
      background: #5848c2;
    }

    .card-footer {
      margin-top: 15px;
      font-size: 14px;
      color: #555;
    }

    @media (max-width: 600px) {
      .phrase-row {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .btns {
        justify-content: center;
      }
    }
  </style>
</head>

<body>

  <main class="container">
    <section class="grid">

      <!-- HTML -->
      <article class="card">
        <h2 class="card-title">HTML</h2>
        <p class="card-desc">جمل أساسية في كتابة هيكل صفحات الويب (HTML).</p>

        <div class="phrases">
          <div class="phrase-row">
            <div class="eng">open tag</div>
            <div class="ara">فتح الوسم</div>
            <div class="btns">
              <button class="speak-btn">EN ▶</button>
              <button class="speak-btn">AR ▶</button>
            </div>
          </div>

          <div class="phrase-row">
            <div class="eng">close tag</div>
            <div class="ara">إغلاق الوسم</div>
            <div class="btns">
              <button class="speak-btn">EN ▶</button>
              <button class="speak-btn">AR ▶</button>
            </div>
          </div>
        </div>

        <div class="card-footer">
          الهدف: تسهيل فهم المسميات الشائعة في HTML.
        </div>
      </article>

      <!-- CSS -->
      <article class="card">
        <h2 class="card-title">CSS</h2>
        <p class="card-desc">مصطلحات تصميم وتنسيق صفحات الويب.</p>

        <div class="phrases">
          <div class="phrase-row">
            <div class="eng">selector</div>
            <div class="ara">محدد</div>
            <div class="btns">
              <button class="speak-btn">EN ▶</button>
              <button class="speak-btn">AR ▶</button>
            </div>
          </div>

          <div class="phrase-row">
            <div class="eng">property</div>
            <div class="ara">خاصية</div>
            <div class="btns">
              <button class="speak-btn">EN ▶</button>
              <button class="speak-btn">AR ▶</button>
            </div>
          </div>
        </div>

        <div class="card-footer">
          الهدف: تعلم أساسيات تنسيق الواجهات.
        </div>
      </article>

    </section>
  </main>

</body>
</html>
