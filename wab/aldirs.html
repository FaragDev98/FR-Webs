<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>FR Webs دروس</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- CSS العام -->
  <link rel="stylesheet" href="../AB/style.css">
  <!-- CSS الصفحة -->
  <link rel="stylesheet" href="syle.css">
</head>
<body>


<div class="profile-container">

  <!-- صورة + بيانات -->
  <div class="profile-card">
    <div class="profile-left">
      <img src="https://i.imgur.com/6VBx3io.png" alt="profile">
    </div>

    <div class="profile-right">
      <h2 id="username">اسم المستخدم</h2>
      <p id="email">example@gmail.com</p>

      <div class="profile-actions">
        <button id="editBtn"><i class="fa fa-edit"></i> تعديل البيانات</button>
        <button id="logoutBtn"><i class="fa fa-sign-out"></i> تسجيل الخروج</button>
      </div>
    </div>
  </div>

  <!-- الخدمات -->
  <div class="services">
    <h3> ابدأ شغلك</h3>

    <div class="services-grid">
      <div class="service-box">
        <i class="fa fa-code"></i>
        <p>تعلم البرمجة</p>
      </div>

      <div class="service-box">
        <i class="fa fa-image"></i>
        <p>عرض أعمالي</p>
      </div>

      <div class="service-box">
        <i class="fa fa-book"></i>
        <p>شراء كتاب</p>
      </div>

      <div class="service-box">
        <i class="fa fa-graduation-cap"></i>
        <p>شراء كورس</p>
      </div>

      <div class="service-box">
        <i class="fa fa-bullhorn"></i>
        <p>اعلن عن شغلك</p>
      </div>
   
  <!-- رفع شغل -->
  <div class="upload-section">
    <h3>📂 ارفع شغلك</h3>
    <input type="file" id="fileUpload">
    <button id="uploadBtn">رفع</button>
    <div id="gallery"></div>
  </div>
</div>








  
  <script src="../AB/footer.js"></script>

<script src="profile.js"></script>















  
</body>
</html>
