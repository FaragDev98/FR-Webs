<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>FR Webs تواصل معنا</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../style.css">
<link rel="stylesheet" href="styles.css">
</head>
<body

<!-- HERO SECTION -->
<section class="hero">
  <div class="hero-inner">
    <div>
      <h1>تواصل ☎️ معنا</h1>
      <p>إذا كان لديك أي استفسار عن الدروس، الكورسات، أو الدعم الفني، يمكنك التواصل معنا من خلال النموذج أدناه أو عبر وسائل التواصل الأخرى.</p>
    </div>
  </div>
</section>
<!-- ======= نموذج التواصل ======= -->
<section class="contact-section container">
  <h2 class="text-center">نموذج الاتصال</h2>
  <p class="lead text-center">املأ البيانات أدناه وسنرد عليك في أقرب وقت ممكن.</p>

  <form id="contactForm" class="contact-form">
    <div class="form-group">
      <label for="name">الاسم:</label>
      <input type="text" id="name" name="name" placeholder="اكتب اسمك" required>
    </div>

    <div class="form-group">
      <label for="email">البريد الإلكتروني:</label>
      <input type="email" id="email" name="email" placeholder="اكتب بريدك الإلكتروني" required>
    </div>

    <div class="form-group">
      <label for="subject">الموضوع:</label>
      <input type="text" id="subject" name="subject" placeholder="موضوع الرسالة" required>
    </div>

    <div class="form-group">
      <label for="message">الرسالة:</label>
      <textarea id="message" name="message" rows="6" placeholder="اكتب رسالتك هنا" required></textarea>
    </div>

    <button type="submit" class="btn-submit">إرسال</button>
    <p id="formMessage" class="form-message"></p>
  </form>

  <div class="contact-info">
    <h3>أو تواصل معنا عبر:</h3>
      <a class="instagram" href="https://www.instagram.com" target="_blank"><i class="fab fa-instagram"></i> إنستغرام</a><a href="https://wa.me/201066047545" target="_blank"><i class="fab fa-whatsapp"></i></a>
        <a href="https://facebook.com" target="_blank"><i class="fab fa-facebook"></i></a>
        <a href="https://instagram.com" target="_blank"><i class="fab fa-instagram"></i></a>
  </div>
</section>


<script src="../footer.js"></script>
</body>
    </html>
