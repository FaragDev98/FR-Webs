<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>مختبر الأكواد</title>
  <link rel="icon" type="image/png" href="../icons/ai-icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Cairo&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Cairo', sans-serif;
      background-color: #121212;
      color: white;
      margin: 0;
      padding: 0;
    }

    header {
      background-color: #1f1f1f;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      color: #e74c3c;
      margin: 0;
      font-size: 28px;
    }

    .btn-group {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin: 20px;
    }

    .btn-group button,
    .btn-group a {
      background-color: transparent;
      border: 1px solid white;
      color: white;
      padding: 10px 16px;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.3s ease;
      text-decoration: none;
    }

    .btn-group button:hover,
    .btn-group a:hover {
      background-color: white;
      color: #121212;
    }

    .code-area {
      background-color: #1f1f1f;
      margin: 20px auto;
      padding: 20px;
      border-radius: 10px;
      width: 90%;
      max-width: 1000px;
    }

    .code-area textarea {
      width: 100%;
      height: 300px;
      background-color: #2c2c2c;
      color: #fff;
      border: none;
      padding: 15px;
      font-family: monospace;
      border-radius: 5px;
      resize: vertical;
    }

    .output-area {
      background-color: #fff;
      color: #000;
      padding: 15px;
      margin-top: 20px;
      border-radius: 5px;
      min-height: 150px;
      font-family: sans-serif;
    }
  </style>
</head>
<body>

  <header>
    <h1>FaragDev | مختبر الأكواد</h1>
  </header>

  <div class="btn-group">
    <button onclick="changeLanguage('html')">HTML</button>
    <button onclick="changeLanguage('css')">CSS</button>
    <button onclick="changeLanguage('js')">JavaScript</button>
    <button onclick="changeLanguage('python')">Python</button>
    <button onclick="changeLanguage('php')">PHP</button>
    <button onclick="changeLanguage('c')">C</button>
    <button onclick="changeLanguage('cpp')">C++</button>
    <button onclick="changeLanguage('java')">Java</button>
    <button onclick="changeLanguage('sql')">SQL</button>
    <button onclick="changeLanguage('bash')">Bash</button>
    <a href="../services.html">🔙 رجوع إلى الخدمات</a>
  </div>

  <div class="code-area">
    <textarea id="codeInput" placeholder="اكتب كودك هنا..."></textarea>
    <div class="output-area" id="outputArea">
      نتيجة الكود ستظهر هنا...
    </div>
  </div>

  <script>
    function changeLanguage(lang) {
      const exampleCodes = {
        html: "<!DOCTYPE html>\n<html>\n<head>\n  <title>صفحة</title>\n</head>\n<body>\n  <h1>مرحباً</h1>\n</body>\n</html>",
        css: "body {\n  background-color: #f0f0f0;\n  color: #333;\n}",
        js: "document.getElementById('outputArea').innerText = 'مرحباً من JavaScript!';",
        python: "print('مرحباً من بايثون')",
        php: "<?php echo 'مرحباً من PHP'; ?>",
        c: "#include <stdio.h>\nint main() {\n  printf(\"مرحباً من C\\n\");\n  return 0;\n}",
        cpp: "#include <iostream>\nusing namespace std;\nint main() {\n  cout << \"مرحباً من C++\";\n  return 0;\n}",
        java: "public class Main {\n  public static void main(String[] args) {\n    System.out.println(\"مرحباً من Java\");\n  }\n}",
        sql: "SELECT * FROM users WHERE active = 1;",
        bash: "echo 'مرحباً من Bash'"
      };
      document.getElementById('codeInput').value = exampleCodes[lang] || '';
      document.getElementById('outputArea').innerText = 'تم إدخال مثال للغة: ' + lang;
    }
  </script>

</body>
</html>
