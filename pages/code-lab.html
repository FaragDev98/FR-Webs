<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>مختبر الأكواد</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #ffffff, #e0e0ff, #ffe0e0, #e0ccff);
      margin: 0;
      padding: 0;
      color: #000;
    }

    header {
      background: linear-gradient(to right, #4a00e0, #8e2de2);
      padding: 15px 20px;
      text-align: center;
      font-size: 26px;
      color: white;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      background: #ffffff;
      box-shadow: 0 4px 8px rgba(0,0,0,0.15);
    }

    nav a {
      padding: 12px 18px;
      color: #4a00e0;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    nav a:hover {
      color: #fff;
      background: #4a00e0;
      border-radius: 8px;
    }

    .container {
      padding: 20px;
    }

    .editor-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      height: 220px;
      padding: 15px;
      font-family: monospace;
      font-size: 14px;
      border-radius: 12px;
      border: 2px solid #4a00e0;
      background: #f4f4f4;
      color: #000;
      resize: none;
    }

    button {
      display: block;
      margin: 0 auto 30px auto;
      background: linear-gradient(to right, #e53935, #8e24aa);
      color: white;
      padding: 14px 28px;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: linear-gradient(to right, #d32f2f, #6a1b9a);
    }

    iframe {
      width: 100%;
      height: 500px;
      background: white;
      border: 4px solid #4a00e0;
      border-radius: 15px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }

    .note {
      color: red;
      text-align: center;
      font-weight: bold;
      margin-top: 15px;
    }

    @media (max-width: 900px) {
      .editor-container {
        grid-template-columns: 1fr;
      }

      textarea {
        height: 180px;
      }

      nav a {
        flex: 1 0 45%;
        text-align: center;
        margin: 4px;
      }
    }
  </style>
</head>
<body>

  <header>
    🔬 مختبر الأكواد - HTML / CSS / JS
  </header>

  <nav>
    <a href="#">🏠 الرئيسية</a>
    <a href="#">🧰 الخدمات</a>
    <a href="#">📚 المقالات</a>
    <a href="#">📞 تواصل</a>
    <a href="#">📄 الشروط والأحكام</a>
  </nav>

  <div class="container">
    <div class="editor-container">
      <textarea id="html" placeholder="HTML هنا..."></textarea>
      <textarea id="css" placeholder="CSS هنا..."></textarea>
      <textarea id="js" placeholder="JavaScript هنا..."></textarea>
    </div>

    <button onclick="runCode()">▶ تشغيل الكود</button>
    <div class="note">💡 ملاحظة: سيتم إظهار الأخطاء البرمجية في الـ Console (اضغط F12 لرؤية الأخطاء).</div>

    <iframe id="result"></iframe>
  </div>

  <script>
    function runCode() {
      const html = document.getElementById('html').value;
      const css = `<style>${document.getElementById('css').value}</style>`;
      const js = `<script>
        try {
          ${document.getElementById('js').value}
        } catch(e) {
          document.body.innerHTML += '<pre style="color:red;">خطأ: ' + e.message + '</pre>';
        }
      <\/script>`;
      const output = html + css + js;

      const iframe = document.getElementById('result');
      iframe.srcdoc = output;
    }
  </script>

</body>
</html>
