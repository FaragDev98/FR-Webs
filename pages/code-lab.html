<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>مختبر الأكواد - FaragDev98</title>
  <!-- أيقونة من مجلد icons -->
  <link rel="icon" href="icons/ai-icon.png" type="image/png" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Cairo', sans-serif;
      background: #121212;
      color: white;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: red;
      margin-bottom: 30px;
    }
    .title-with-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .title-with-icon img {
      width: 32px;
      height: 32px;
    }
    select,
    button {
      background: transparent;
      border: 2px solid white;
      color: white;
      padding: 10px 15px;
      border-radius: 10px;
      font-size: 16px;
      margin: 10px 5px;
      cursor: pointer;
      transition: 0.3s;
    }
    select:hover,
    button:hover {
      background: red;
      color: white;
    }
    #runBtn {
      background: #007bff;
      border-color: #007bff;
    }
    #runBtn:hover {
      background: #0056b3;
      border-color: #0056b3;
    }
    textarea {
      width: 100%;
      height: 150px;
      background: #1e1e1e;
      color: white;
      border: 1px solid #555;
      border-radius: 10px;
      padding: 10px;
      margin-top: 10px;
      font-family: monospace;
      font-size: 14px;
    }
    .editor-section {
      margin-bottom: 20px;
    }
    iframe {
      width: 100%;
      height: 300px;
      border: 1px solid #444;
      border-radius: 10px;
      background: white;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .back-button {
      position: fixed;
      top: 20px;
      left: 20px;
      background: red;
      border: none;
      color: white;
      padding: 10px 15px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }
    .back-button:hover {
      background: #a30000;
    }
  </style>
</head>
<body>
  <h1 class="title-with-icon">
    <img src="icons/ai-icon.png" alt="رمز الموقع" />
    🕎 مختبر الأكواد - FaragDev98
  </h1>

  <div class="toolbar">
    <select id="languageSelect">
      <option value="html">HTML</option>
      <option value="css">CSS</option>
      <option value="javascript">JavaScript</option>
      <option value="python">Python</option>
      <option value="php">PHP</option>
      <option value="java">Java</option>
      <option value="c">C</option>
      <option value="cpp">C++</option>
      <option value="ruby">Ruby</option>
      <option value="go">Go</option>
    </select>
    <button id="runBtn" onclick="runCode()">تشغيل الكود</button>
    <button class="back-button" onclick="goBack()">🔙 رجوع للخدمات</button>
  </div>

  <div class="editor-section">
    <label>كود HTML</label>
    <textarea id="htmlCode" placeholder="أدخل كود HTML هنا..."></textarea>
  </div>

  <div class="editor-section">
    <label>كود CSS</label>
    <textarea id="cssCode" placeholder="أدخل كود CSS هنا..."></textarea>
  </div>

  <div class="editor-section">
    <label>كود JavaScript</label>
    <textarea id="jsCode" placeholder="أدخل كود JavaScript هنا..."></textarea>
  </div>

  <h2>النتيجة:</h2>
  <iframe id="result"></iframe>

  <script>
    function runCode() {
      const html = document.getElementById("htmlCode").value;
      const css = document.getElementById("cssCode").value;
      const js = document.getElementById("jsCode").value;

      const resultFrame = document.getElementById("result");
      resultFrame.srcdoc = `
        <html>
          <head>
            <style>${css}</style>
          </head>
          <body>
            ${html}
            <script>${js}<\/script>
          </body>
        </html>
      `;
    }

    function goBack() {
      window.location.href = "services.html";
    }
  </script>
</body>
</html>
