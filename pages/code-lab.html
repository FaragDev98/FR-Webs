<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>مختبر الأكواد</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #2c003e, #4a0072);
      margin: 0;
      padding: 0;
      color: white;
    }

    header {
      background-color: #1a1a1a;
      padding: 20px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      color: #ffffff;
      box-shadow: 0 4px 8px rgba(0,0,0,0.4);
    }

    h1 {
      margin: 0;
      font-size: 26px;
    }

    .container {
      padding: 20px;
    }

    .editor-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      height: 250px;
      padding: 15px;
      font-family: monospace;
      font-size: 14px;
      border-radius: 12px;
      border: none;
      background: #1e1e1e;
      color: #ffffff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      resize: none;
    }

    button {
      display: block;
      margin: 0 auto 30px auto;
      background: linear-gradient(to right, #8e2de2, #4a00e0);
      color: white;
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: linear-gradient(to right, #7a1fdc, #3d00c1);
    }

    iframe {
      width: 100%;
      height: 500px;
      background: white;
      border: 4px solid #4a00e0;
      border-radius: 15px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }

    @media (max-width: 900px) {
      .editor-container {
        grid-template-columns: 1fr;
      }

      textarea {
        height: 200px;
      }
    }
  </style>
</head>
<body>

  <header>
    🔬 مختبر الأكواد - HTML / CSS / JS
  </header>

  <div class="container">
    <div class="editor-container">
      <textarea id="html" placeholder="HTML هنا..."></textarea>
      <textarea id="css" placeholder="CSS هنا..."></textarea>
      <textarea id="js" placeholder="JavaScript هنا..."></textarea>
    </div>

    <button onclick="runCode()">▶ تشغيل الكود</button>

    <iframe id="result"></iframe>
  </div>

  <script>
    function runCode() {
      const html = document.getElementById('html').value;
      const css = `<style>${document.getElementById('css').value}</style>`;
      const js = `<script>${document.getElementById('js').value}<\/script>`;
      const output = html + css + js;

      const iframe = document.getElementById('result');
      iframe.srcdoc = output;
    }
  </script>
</body>
</html>
