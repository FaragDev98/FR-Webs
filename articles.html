<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>المقالات - FaragDev98</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f9f9f9;
      margin: 0;
      padding: 0;
    }

    header {
      background: #7b1fa2;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .articles-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 30px;
    }

    .article {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: transform 0.3s;
    }

    .article:hover {
      transform: scale(1.03);
    }

    .article img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .article-title {
      padding: 15px;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      color: #333;
    }

    footer {
      background: #2e2e2e;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 14px;
    }

    footer a {
      color: #bb86fc;
      margin: 0 8px;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <header>
    <h1>المقالات</h1>
  </header>

  <section class="articles-container">
    <div class="article">
      <img src="images/article1.jpg" alt="مقال 1" />
      <div class="article-title">عنوان المقال الأول</div>
    </div>

    <div class="article">
      <img src="images/article2.jpg" alt="مقال 2" />
      <div class="article-title">عنوان المقال الثاني</div>
    </div>

    <div class="article">
      <img src="images/article3.jpg" alt="مقال 3" />
      <div class="article-title">عنوان المقال الثالث</div>
    </div>

    <div class="article">
      <img src="images/article4.jpg" alt="مقال 4" />
      <div class="article-title">عنوان المقال الرابع</div>
    </div>

    <div class="article">
      <img src="images/article5.jpg" alt="مقال 5" />
      <div class="article-title">عنوان المقال الخامس</div>
    </div>
  </section>

  <footer>
    جميع الحقوق محفوظة © 2025 FaragDev98 | 
    <a href="terms.html">الشروط والأحكام</a> |
    <a href="privacy.html">سياسة الخصوصية</a> |
    <a href="security.html">صفحة الحماية</a>
  </footer>

</body>
</html>
